name: Auto PR - Develop para Main

on:
  push:
    branches:
      - develop

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Criar PR de develop para main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --head develop \
            --base main \
            --state open \
            --json number \
            --jq length)

          if [ "$EXISTING" -gt 0 ]; then
            echo "PR já existe para develop → main. Nenhuma ação necessária."
            exit 0
          fi

          BODY=$(git log origin/main..HEAD --pretty=format:"- %s" --no-merges)

          gh pr create \
            --head develop \
            --base main \
            --title "release: develop → main" \
            --body "$BODY" \
            --label "auto-pr"
